<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body><!DOCTYPE html>
<html>
<head>
    <title>Student Result Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f2f2f2;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Result Calculator</h2>

    <input type="number" id="subjects" placeholder="Enter number of subjects">
    <button onclick="getMarks()">Enter Marks</button>

    <div id="marksInput"></div>

    <button onclick="calculateResult()">Calculate Result</button>

    <div id="result"></div>
</div>

<script>
    function getMarks() {
        let n = document.getElementById("subjects").value;
        let marksDiv = document.getElementById("marksInput");
        marksDiv.innerHTML = "";

        for (let i = 1; i <= n; i++) {
            marksDiv.innerHTML += 
                `<input type="number" id="mark${i}" placeholder="Marks of Subject ${i}"><br>`;
        }
    }

    function calculateResult() {
        let n = document.getElementById("subjects").value;
        let total = 0;

        for (let i = 1; i <= n; i++) {
            let mark = parseFloat(document.getElementById("mark" + i).value);
            total += mark;
        }

        let average = total / n;
        let grade;
        let result;

        // Grade calculation (if-else)
        if (average >= 90) grade = "A+";
        else if (average >= 75) grade = "A";
        else if (average >= 60) grade = "B";
        else if (average >= 50) grade = "C";
        else grade = "F";

        // Pass/Fail
        if (average >= 50) result = "Pass";
        else result = "Fail";

        // Display output
        document.getElementById("result").innerHTML = `
            Total Marks: ${total} <br>
            Average Marks: ${average.toFixed(2)} <br>
            Grade: ${grade} <br>
            Result: ${result}
        `;
    }
</script>

</body>
</html>
    
</body>
</html>
